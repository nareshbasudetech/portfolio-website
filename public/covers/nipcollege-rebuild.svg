          <text x="146" y="22" font-family="General Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f2ec">GNM</text>

          <rect x="264" width="120" height="36" rx="6" fill="#0d0d0d" stroke="#1f1f1f"/>
          <text x="278" y="22" font-family="General Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f2ec">D. Pharma</text>

          <rect y="44" width="120" height="36" rx="6" fill="#0d0d0d" stroke="#1f1f1f"/>
          <text x="14" y="66" font-family="General Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f2ec">B. Pharma</text>

          <rect x="132" y="44" width="120" height="36" rx="6" fill="#0d0d0d" stroke="#1f1f1f"/>
          <text x="146" y="66" font-family="General Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f2ec">ANM</text>

          <rect x="264" y="44" width="120" height="36" rx="6" fill="#0d0d0d" stroke="#1f1f1f"/>
          <text x="278" y="66" font-family="General Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f2ec">Paramedical</text>
