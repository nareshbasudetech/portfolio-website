      <rect y="20" width="540" height="36" rx="12" fill="#0d0d0d"/>
      <rect y="38" width="540" height="18" fill="#0d0d0d"/>
      <circle cx="18" cy="38" r="5" fill="#6f6c66"/>
      <text x="270" y="42" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#6f6c66">php · 2014 build</text>

      <!-- Old site mock - dated/cluttered -->
      <rect x="20" y="76" width="500" height="60" fill="#1a1305"/>
      <text x="40" y="100" font-family="Times, serif" font-size="22" fill="#f5f2ec">NIP COLLEGE</text>
      <text x="40" y="118" font-family="Times, serif" font-size="11" fill="#c9c5bd">Welcome to our institution est. 1995</text>

      <!-- Old menu -->
