        <rect width="500" height="22" fill="#0d0d0d"/>
        <text x="14" y="15">Home</text>
        <text x="74" y="15">About Us</text>
        <text x="148" y="15">Courses</text>
        <text x="218" y="15">Faculty</text>
        <text x="282" y="15">Admissions</text>
        <text x="362" y="15">Gallery</text>
        <text x="424" y="15">Contact</text>
      </g>

      <!-- Old chunky body -->
      <g transform="translate(20 196)" font-family="Times, serif">
        <text font-size="11" fill="#c9c5bd">▸ Latest Notice: Admissions open for 2024-25</text>
        <text y="20" font-size="11" fill="#c9c5bd">▸ Result: B.Sc. Nursing Sem-II declared</text>
        <text y="40" font-size="11" fill="#c9c5bd">▸ Event: Annual Day on 12th March</text>

        <rect y="60" width="240" height="160" fill="#1f1f1f"/>
        <text x="120" y="148" text-anchor="middle" font-size="10" fill="#6f6c66">[ image placeholder ]</text>

        <rect x="260" y="60" width="240" height="160" fill="#1f1f1f"/>
        <text x="380" y="148" text-anchor="middle" font-size="10" fill="#6f6c66">[ image placeholder ]</text>

