<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="ABS + NGI Education Platforms — illustrative case study cover">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06121f"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Two windows side-by-side -->
  <g transform="translate(60 130)">
    <rect width="540" height="540" rx="12" fill="#0a0a0a" stroke="#1f1f1f"/>
    <rect width="540" height="36" rx="12" fill="#0d0d0d"/>
    <rect y="18" width="540" height="18" fill="#0d0d0d"/>
    <circle cx="18" cy="18" r="5" fill="#0ea5e9"/>
    <text x="270" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#6f6c66" letter-spacing="2">abseducationalsolution.com</text>

    <!-- Hero -->
    <g transform="translate(30 60)">
      <text font-family="General Sans, sans-serif" font-size="13" fill="#0ea5e9" letter-spacing="3">ABS · EDUCATIONAL SOLUTIONS</text>
      <text y="36" font-family="General Sans, sans-serif" font-size="32" font-weight="700" fill="#f5f2ec" letter-spacing="-1">Build the career.</text>
      <text y="68" font-family="General Sans, sans-serif" font-size="32" font-weight="700" fill="#f5f2ec" letter-spacing="-1">Start the course.</text>
      <text y="98" font-family="Inter, sans-serif" font-size="12" fill="#c9c5bd">Counsellors, courses, and admissions in one place.</text>

      <rect y="120" width="140" height="36" rx="18" fill="#0ea5e9"/>
      <text x="70" y="142" text-anchor="middle" font-family="General Sans, sans-serif" font-size="12" font-weight="600" fill="#050505">Apply now ↗</text>
      <text x="160" y="142" font-family="JetBrains Mono, monospace" font-size="10" fill="#6f6c66">+ COUNSEL CALL</text>
    </g>

    <!-- Course cards -->
    <g transform="translate(30 230)">
      <text font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="2" fill="#6f6c66">FEATURED COURSES</text>
      <g transform="translate(0 16)">
        <rect width="150" height="120" rx="6" fill="#0d0d0d" stroke="#1f1f1f"/>
        <rect x="14" y="14" width="60" height="14" rx="2" fill="#0ea5e9" opacity="0.3"/>
        <text x="14" y="50" font-family="General Sans, sans-serif" font-size="13" font-weight="600" fill="#f5f2ec">B.Sc Nursing</text>
        <text x="14" y="68" font-family="Inter, sans-serif" font-size="10" fill="#c9c5bd">3 yrs · 8 batches</text>
        <text x="14" y="100" font-family="JetBrains Mono, monospace" font-size="9" fill="#0ea5e9">ENROL ↗</text>

        <rect x="170" width="150" height="120" rx="6" fill="#0d0d0d" stroke="#1f1f1f"/>
        <rect x="184" y="14" width="60" height="14" rx="2" fill="#22c55e" opacity="0.3"/>
        <text x="184" y="50" font-family="General Sans, sans-serif" font-size="13" font-weight="600" fill="#f5f2ec">D. Pharma</text>
        <text x="184" y="68" font-family="Inter, sans-serif" font-size="10" fill="#c9c5bd">2 yrs · 12 seats</text>
        <text x="184" y="100" font-family="JetBrains Mono, monospace" font-size="9" fill="#0ea5e9">ENROL ↗</text>

        <rect x="340" width="140" height="120" rx="6" fill="#0d0d0d" stroke="#1f1f1f"/>
        <rect x="354" y="14" width="60" height="14" rx="2" fill="#ff5b1f" opacity="0.3"/>
        <text x="354" y="50" font-family="General Sans, sans-serif" font-size="13" font-weight="600" fill="#f5f2ec">GNM</text>
        <text x="354" y="68" font-family="Inter, sans-serif" font-size="10" fill="#c9c5bd">3 yrs · open</text>
        <text x="354" y="100" font-family="JetBrains Mono, monospace" font-size="9" fill="#0ea5e9">ENROL ↗</text>
      </g>
    </g>

    <!-- Admin annotation -->
    <g transform="translate(30 410)">
      <rect width="480" height="100" rx="6" fill="#0d0d0d" stroke="#0ea5e9" stroke-opacity="0.35"/>
      <text x="14" y="24" font-family="JetBrains Mono, monospace" font-size="10" fill="#0ea5e9" letter-spacing="2">/ADMIN · CMS</text>
      <text x="14" y="48" font-family="General Sans, sans-serif" font-size="13" font-weight="600" fill="#f5f2ec">Counsellors edit content directly.</text>
      <text x="14" y="68" font-family="Inter, sans-serif" font-size="11" fill="#c9c5bd">Courses · Faculty · Admissions intake · Lead routing</text>
      <text x="14" y="86" font-family="JetBrains Mono, monospace" font-size="9" fill="#5af28b">● PUBLISHED IN-HOUSE</text>
    </g>
  </g>

  <!-- Window 2 -->
  <g transform="translate(620 130)">
    <rect width="520" height="540" rx="12" fill="#0a0a0a" stroke="#1f1f1f"/>
    <rect width="520" height="36" rx="12" fill="#0d0d0d"/>
    <rect y="18" width="520" height="18" fill="#0d0d0d"/>
    <circle cx="18" cy="18" r="5" fill="#7b5cff"/>
    <text x="260" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#6f6c66" letter-spacing="2">ngiadmissionmilega.com</text>

    <!-- Funnel hero -->
    <g transform="translate(30 60)">
      <text font-family="General Sans, sans-serif" font-size="13" fill="#7b5cff" letter-spacing="3">NGI · ADMISSION MILEGA</text>
      <text y="40" font-family="General Sans, sans-serif" font-size="40" font-weight="700" fill="#f5f2ec" letter-spacing="-1.5">Admission. Milega.</text>
      <text y="68" font-family="Inter, sans-serif" font-size="12" fill="#c9c5bd">Get matched with the right college, fast.</text>

      <!-- Funnel form -->
      <g transform="translate(0 100)">
        <text font-family="JetBrains Mono, monospace" font-size="10" fill="#6f6c66" letter-spacing="2">FIND YOUR ADMISSION</text>

        <rect y="20" width="460" height="44" rx="6" fill="#0d0d0d" stroke="#1f1f1f"/>
        <text x="14" y="46" font-family="Inter, sans-serif" font-size="13" fill="#f5f2ec">Course you're looking for</text>
        <text x="446" y="46" text-anchor="end" font-family="Inter, sans-serif" font-size="13" fill="#7b5cff">▾</text>

        <rect y="76" width="460" height="44" rx="6" fill="#0d0d0d" stroke="#1f1f1f"/>
        <text x="14" y="102" font-family="Inter, sans-serif" font-size="13" fill="#c9c5bd">City</text>
        <text x="446" y="102" text-anchor="end" font-family="Inter, sans-serif" font-size="13" fill="#7b5cff">▾</text>

        <rect y="132" width="460" height="44" rx="6" fill="#0d0d0d" stroke="#1f1f1f"/>
        <text x="14" y="158" font-family="Inter, sans-serif" font-size="13" fill="#c9c5bd">Phone (we'll WhatsApp)</text>

        <rect y="194" width="220" height="44" rx="22" fill="#7b5cff"/>
        <text x="110" y="220" text-anchor="middle" font-family="General Sans, sans-serif" font-size="13" font-weight="600" fill="#050505">Get my matches ↗</text>
      </g>

      <!-- Trust strip -->
      <g transform="translate(0 380)">
        <text font-family="JetBrains Mono, monospace" font-size="10" fill="#6f6c66" letter-spacing="2">TRUSTED BY</text>
        <g transform="translate(0 14)" font-family="JetBrains Mono, monospace" font-size="11" fill="#c9c5bd" opacity="0.7">
          <text>NIP COLLEGE</text>
          <text x="120">ABS GROUP</text>
          <text x="240">+ 12 PARTNERS</text>
        </g>
      </g>
    </g>
  </g>

  <g font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="3" fill="#f5f2ec" opacity="0.5">
    <text x="60" y="48">EDUCATION · ABS + NGI · CASE STUDY · 2026</text>
    <text x="1140" y="48" text-anchor="end">[ ILLUSTRATIVE ]</text>
    <text x="60" y="780">DEV / DESIGN / EDUCATION</text>
    <text x="1140" y="780" text-anchor="end">VOL · 02 / 2026</text>
  </g>
</svg>
