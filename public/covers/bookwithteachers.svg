        <text x="86" y="56" font-family="Inter, sans-serif" font-size="11" fill="#c9c5bd">Last viewed 2 days ago · 67% complete</text>
        <rect x="86" y="62" width="200" height="3" fill="#1f1f1f"/>
        <rect x="86" y="62" width="134" height="3" fill="#22c55e"/>

        <rect y="92" width="460" height="80" rx="8" fill="#0d0d0d" stroke="#1f1f1f"/>
        <rect x="14" y="106" width="60" height="52" rx="4" fill="#7b5cff" opacity="0.3"/>
        <text x="86" y="128" font-family="General Sans, sans-serif" font-size="14" font-weight="600" fill="#f5f2ec">Pharmacology Basics</text>
