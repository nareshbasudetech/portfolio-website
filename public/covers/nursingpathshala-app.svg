    <text y="118" font-family="Inter, sans-serif" font-size="11" fill="#c9c5bd">nursing students. Lessons,</text>
    <text y="136" font-family="Inter, sans-serif" font-size="11" fill="#c9c5bd">notes, mock tests, offline-</text>
