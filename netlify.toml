[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"
  NPM_FLAGS = "--no-audit --no-fund"

# Static 404 for unmatched routes
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Convenience: /sitemap.xml -> the actual sitemap index
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 301
